spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
  mail:
    host: smtp.naver.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

nara:
  api:
    key: ${NARA_API_KEY}
    base-url: https://apis.data.go.kr/1230000/ad/BidPublicInfoService

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION}

app:
  frontend-base-url: ${FRONTEND_BASE_URL}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}