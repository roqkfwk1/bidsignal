services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bidsignal-app
    restart: unless-stopped
    mem_limit: 768m
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xms256m -Xmx512m"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17
    container_name: bidsignal-postgres
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_DB: bidsignal
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - bidsignal-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: bidsignal-redis
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  bidsignal-postgres-data: