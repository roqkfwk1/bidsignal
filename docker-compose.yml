services:
  postgres:
    image: postgres:17
    container_name: bidsignal-postgres
    environment:
      POSTGRES_DB: bidsignal
      POSTGRES_USER: bidsignal
      POSTGRES_PASSWORD: bidsignal
    ports:
      - "5432:5432"
    volumes:
      - bidsignal-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: bidsignal-redis
    ports:
      - "6379:6379"

volumes:
  bidsignal-postgres-data: